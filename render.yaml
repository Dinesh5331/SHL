services:
  - type: web
    name: shl-recommender
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free                   # Free tier: 512 MB RAM, spins down after 15 min idle
    healthCheckPath: /health

    envVars:
      - key: GROQ_API_KEY
        sync: false              # Set manually in Render dashboard — never commit the key
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONIOENCODING
        value: utf-8
